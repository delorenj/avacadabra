services:
  app:
    build: .
    container_name: avacadabra_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${AVA_DATABASE_URL:-postgresql://postgres:postgres@avacadabra_db:5432/avacadabra}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-drive.delo.sh}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-true}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minio}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minio123}
      - MINIO_BUCKET=${MINIO_BUCKET:-avamath}
    ports:
      - "3000:3000"
    depends_on:
      avacadabra_db:
        condition: service_healthy
    networks:
      - proxy
    labels:
      # Expose the service to Traefik on the proxy network
      - traefik.enable=true
      - traefik.http.routers.avacadabra.rule=Host(`ava.delo.sh`)
      - traefik.http.routers.avacadabra.entrypoints=websecure
      - traefik.http.services.avacadabra.loadbalancer.server.port=3000
  avacadabra_db:
    image: postgres:15
    container_name: avacadabra_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=avacadabra
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avacadabra"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - proxy

volumes:
  db_data:

networks:
  proxy:
    external: true